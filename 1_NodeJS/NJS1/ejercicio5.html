<!DOCTYPE html>
<html>
<head>
    <title>Resultados</title>
    <style>
        table {
            border-collapse: collapse;
            width: 50%;
            margin: 20px auto;
            font-family: Arial;
        }
        th, td {
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }
        th {
            background-color: #333;
            color: white;
        }
    </style>
</head>
<body>

<table>
    <tr>
        <th>Operación</th>
        <th>Resultado</th>
    </tr>
    <tr>
        <td>5 + 3</td>
        <td>8</td>
    </tr>
    <tr>
        <td>8 - 6</td>
        <td>2</td>
    </tr>
    <tr>
        <td>3 * 11</td>
        <td>33</td>
    </tr>
    <tr>
        <td>30 / 5</td>
        <td>6</td>
    </tr>
</table>

</body>
</html>
